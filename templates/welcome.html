<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoScript | Neural Audio Systems</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --neon-cyan: #b9ffe8;
            --neon-blue: #72dcff;
            --neon-purple: #c47fff;
            --deep-navy: #020617;
            --glass: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(185, 255, 232, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--deep-navy);
            font-family: 'Space Grotesk', sans-serif;
            color: #ffffff;
        }

        .system-viewport {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1500px;
        }

        /* Background Layers */
        .canvas-bg {
            position: absolute;
            inset: 0;
            z-index: 1;
            filter: brightness(0.8) contrast(1.2);
        }

        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(2, 6, 23, 0.9) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(185, 255, 232, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(185, 255, 232, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 3;
            opacity: 0.5;
            pointer-events: none;
        }

        /* Header Elements */
        .system-header {
            position: absolute;
            top: 2rem;
            width: 100%;
            padding: 0 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            opacity: 0;
            transform: translateY(-20px);
        }

        .version-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--neon-cyan);
            letter-spacing: 0.2em;
            background: rgba(185, 255, 232, 0.05);
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--glass-border);
            border-radius: 4px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.75rem;
            color: var(--neon-cyan);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-cyan);
            animation: pulse 2s infinite;
        }

        /* Central Branding - Focused and Balanced */
        .hero-container {
            position: relative;
            z-index: 10;
            text-align: center;
            transform-style: preserve-3d;
            padding: 4rem;
            border-radius: 50%;
            /* Focus Zone: Ensures text pops regardless of background intensity */
            background: radial-gradient(circle at center, rgba(2, 6, 23, 0.7) 0%, rgba(2, 6, 23, 0) 75%);
        }

        .icon-box {
            font-size: 2.5rem;
            color: var(--neon-cyan);
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: scale(0.5);
            filter: drop-shadow(0 0 15px var(--neon-cyan));
        }

        .main-title {
            display: flex;
            gap: 0.1em;
            margin-bottom: 0.8rem;
        }

        .char {
            display: inline-block;
            font-size: clamp(4.5rem, 12vw, 9rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            opacity: 0;
            transform: translateY(50px) rotateX(-90deg);
            background: linear-gradient(180deg, #fff 40%, var(--neon-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(185, 255, 232, 0.2);
        }

        .tagline {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.6em;
            color: var(--neon-blue);
            text-transform: uppercase;
            opacity: 0;
            margin-top: 1rem;
            margin-bottom: 3rem;
            text-indent: 0.6em; /* offset last letter spacing */
        }

        /* Floating Modules - Adjusted for Safe Zones */
        .module-badge {
            position: absolute;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            opacity: 0;
            z-index: 5;
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        @media (max-width: 992px) {
            .module-badge {
                display: none; /* Hide on smaller screens to avoid clutter */
            }
        }

        @media (max-width: 576px) {
            .hero-container {
                padding: 2rem 1rem;
            }
            .tagline {
                font-size: 0.7rem;
                letter-spacing: 0.3em;
                text-indent: 0.3em;
            }
            .system-header {
                padding: 0 1.5rem;
                top: 1.5rem;
            }
            .version-tag {
                font-size: 0.65rem;
                padding: 0.3rem 0.6rem;
            }
            .status-indicator {
                font-size: 0.65rem;
            }
        }

        .badge-icon {
            color: var(--neon-purple);
            font-size: 1.1rem;
        }

        .badge-text {
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Action Section */
        .action-group {
            opacity: 0;
            transform: translateY(30px);
        }

        .btn-launch {
            position: relative;
            padding: 1.2rem 4rem;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: #fff;
            background: transparent;
            border: 1px solid rgba(185, 255, 232, 0.3);
            border-radius: 5px;
            text-decoration: none;
            transition: all 0.5s ease;
            overflow: hidden;
        }

        .btn-launch:hover {
            color: var(--deep-navy);
            background: var(--neon-cyan);
            box-shadow: 0 0 40px rgba(185, 255, 232, 0.5);
            border-color: var(--neon-cyan);
        }

        .footer-info {
            position: absolute;
            bottom: 2rem;
            width: 100%;
            text-align: center;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            z-index: 20;
            opacity: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <header class="system-header" id="header">
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span>System Status: Optimal</span>
        </div>
        <div class="version-tag">VER 2.1 // EXPERIMENTAL</div>
    </header>

    <div class="system-viewport">
        <div class="canvas-bg" aria-hidden="true">
            <div 
                id="unicorn-canvas"
                data-us-project="dXj8bZT3fIINcuQ2KSfl"
                data-us-scale="1"
                data-us-dpi="1.5"
                style="width: 100%; height: 100%;"
            ></div>
        </div>
        <div class="vignette"></div>
        <div class="grid-overlay"></div>

        <!-- Floating UI Modules -->
        <div class="module-badge" id="m1" style="top: 20%; left: 15%;">
            <i class="bi bi-cpu badge-icon"></i>
            <span class="badge-text">Neural Sync Active</span>
        </div>
        <div class="module-badge" id="m2" style="top: 25%; right: 18%;">
            <i class="bi bi-soundwave badge-icon"></i>
            <span class="badge-text">Audio Core v3.0</span>
        </div>
        <div class="module-badge" id="m3" style="bottom: 25%; left: 20%;">
            <i class="bi bi-diagram-3 badge-icon"></i>
            <span class="badge-text">Parallel Engine</span>
        </div>

        <main class="hero-container" id="hero">
            <div class="icon-box" id="hero-icon">
                <i class="bi bi-soundwave"></i>
            </div>
            
            <div class="main-title" id="title-text">
                <!-- Letters injected -->
            </div>

            <div class="tagline" id="hero-tagline">
                Redefining Auditory Intelligence
            </div>

            <div class="action-group" id="hero-action">
                <a href="/home" class="btn-launch">
                    Initialize System
                </a>
            </div>
        </main>

        <footer class="footer-info" id="footer">
            &copy; 2026 EchoScript Neural Networks // All Rights Reserved
        </footer>
    </div>

    <!-- Animation Suite -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@2.1.12/dist/unicornStudio.umd.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const title = "EchoScript";
            const titleContainer = document.getElementById('title-text');
            
            title.split('').forEach(l => {
                const s = document.createElement('span');
                s.className = 'char';
                s.textContent = l;
                titleContainer.appendChild(s);
            });

            const chars = document.querySelectorAll('.char');
            const tl = gsap.timeline();

            // 1. Entry Sequence
            tl.to("#header", { opacity: 1, y: 0, duration: 1, ease: "power2.out" });
            
            tl.to("#hero-icon", {
                opacity: 1,
                scale: 1,
                duration: 0.8,
                ease: "back.out(2)"
            }, "-=0.5");

            tl.to(chars, {
                opacity: 1,
                y: 0,
                rotateX: 0,
                duration: 1.2,
                stagger: 0.08,
                ease: "power4.out"
            }, "-=0.4");

            tl.to("#hero-tagline", {
                opacity: 1,
                letterSpacing: "0.8em",
                duration: 1.5,
                ease: "power2.out"
            }, "-=0.5");

            tl.to(".module-badge", {
                opacity: 1,
                stagger: 0.2,
                duration: 1,
                ease: "power2.out"
            }, "-=1");

            tl.to("#hero-action", {
                opacity: 1,
                y: 0,
                duration: 1,
                ease: "back.out(1.2)"
            }, "-=0.8");

            tl.to("#footer", { opacity: 1, duration: 1 }, "-=0.5");

            // 2. Idle Floating Motion
            gsap.to(".module-badge", {
                y: "-=20",
                duration: 3,
                repeat: -1,
                yoyo: true,
                ease: "sine.inOut",
                stagger: 0.5
            });

            // 3. Mouse Parallax
            document.addEventListener('mousemove', (e) => {
                const { clientX, clientY } = e;
                const x = (clientX / window.innerWidth - 0.5) * 50;
                const y = (clientY / window.innerHeight - 0.5) * 50;

                gsap.to("#hero", {
                    rotateY: x * 0.5,
                    rotateX: -y * 0.5,
                    duration: 1,
                    ease: "power2.out"
                });

                gsap.to(".module-badge", {
                    x: (i) => (i + 1) * x * 0.3,
                    y: (i) => (i + 1) * y * 0.3,
                    duration: 2,
                    ease: "power2.out"
                });
            });

            if (window.UnicornStudio) {
                UnicornStudio.init();
            }
        });
    </script>
</body>
</html>
