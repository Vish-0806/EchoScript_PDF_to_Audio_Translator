{% extends "base.html" %}

{% block title %}Audio Output - EchoScript{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h2 class="mb-0">Audio Generated Successfully</h2>
            </div>
            <div class="card-body text-center">
                <p class="text-muted mb-4">Your PDF has been converted to audio. Play it below:</p>
                
                <div class="audio-player mb-4">
                    <audio controls class="w-100" style="max-width: 500px;">
                        <source src="{{ url_for('static', filename='output.mp3') }}" type="audio/mpeg">
                        Your browser does not support the audio element.
                    </audio>
                </div>
                
                <div class="btn-group" role="group">
                    <a href="/" class="btn btn-primary">
                        Convert Another
                    </a>
                    <a href="{{ url_for('static', filename='output.mp3') }}" download class="btn btn-outline-secondary">
                        Download
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
