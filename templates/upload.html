{% extends "base.html" %}

{% block title %}Upload PDF | EchoScript{% endblock %}

{% block content %}
<section class="hero-section d-flex align-items-center justify-content-center min-vh-100 position-relative overflow-hidden">
    <div class="position-absolute top-50 start-50 translate-middle w-100 h-100 pointer-events-none animated-bg-glow" style="z-index: 0;"></div>

    <div class="container position-relative" style="z-index: 1; max-width: 750px;">
        <div class="text-center mb-5 fade-in-up">
            <div class="d-flex justify-content-center align-items-center mb-3">
                <div class="hero-waveform me-3" aria-hidden="true">
                    <div class="hero-bar"></div>
                    <div class="hero-bar"></div>
                    <div class="hero-bar"></div>
                    <div class="hero-bar"></div>
                </div>
                <h1 class="display-4 fw-bold mb-0 text-white" style="letter-spacing: -0.04em; text-shadow: 0 0 20px rgba(0, 243, 255, 0.5);">Upload PDF</h1>
                <div class="hero-waveform ms-3" aria-hidden="true">
                    <div class="hero-bar"></div>
                    <div class="hero-bar"></div>
                    <div class="hero-bar"></div>
                    <div class="hero-bar"></div>
                </div>
            </div>
            <p class="fs-5 mx-auto" style="max-width: 600px; color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0, 243, 255, 0.2); font-weight: 500;">Upload your PDF and configure voice generation settings.</p>
        </div>

        <div class="card glass-card border-0 p-4 p-md-5 fade-in-up" style="animation-delay: 0.15s;">
            <form action="{{ url_for('upload') }}" method="POST" enctype="multipart/form-data">
                <div class="upload-drop-zone mb-4 position-relative rounded-4 p-5 text-center" id="drop-zone">
                    <input type="file" class="position-absolute top-0 start-0 w-100 h-100 opacity-0" id="pdf_file" name="pdf_file" accept=".pdf" required style="cursor: pointer;">
                    <div class="upload-content pointer-events-none">
                        <svg id="upload-icon" xmlns="http://www.w3.org/2000/svg" width="56" height="56" fill="currentColor" class="bi bi-cloud-arrow-up mb-3" style="color: var(--text-secondary); transition: all 0.3s ease;" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M7.646 5.146a.5.5 0 0 1 .708 0l2 2a.5.5 0 0 1-.708.708L8.5 6.707V10.5a.5.5 0 0 1-1 0V6.707L6.354 7.854a.5.5 0 1 1-.708-.708z"/>
                            <path d="M4.406 3.342A5.53 5.53 0 0 1 8 2c2.69 0 4.923 2 5.166 4.579C14.758 6.804 16 8.137 16 9.773 16 11.569 14.502 13 12.687 13H3.781C1.708 13 0 11.366 0 9.318c0-1.763 1.266-3.223 2.942-3.593.143-.863.698-1.723 1.464-2.383zm.653.757c-.757.653-1.153 1.44-1.153 2.056v.448l-.445.049C2.064 6.805 1 7.952 1 9.318 1 10.785 2.23 12 3.781 12h8.906C13.98 12 15 10.988 15 9.773c0-1.216-1.02-2.228-2.313-2.228h-.5v-.5C12.188 4.825 10.328 3 8 3a4.53 4.53 0 0 0-2.941 1.1z"/>
                        </svg>
                        <h5 class="fw-semibold mb-1 text-white" id="drop-text">Upload your PDF</h5>
                        <p class="text-secondary small mb-0" id="file-name">Browse files or drag and drop here</p>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold text-secondary small text-uppercase upload-field-label">Language</label>
                        <select class="form-select border-0 shadow-sm rounded-3 py-2" name="language">
                            <option value="en" selected>English</option>
                            <option value="hi">Hindi</option>
                            <option value="es">Spanish</option>
                            <option value="kn">Kannada</option>
                        </select>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold text-secondary small text-uppercase upload-field-label">Speed</label>
                        <select class="form-select border-0 shadow-sm rounded-3 py-2" name="speed">
                            <option value="slow">Slow</option>
                            <option value="normal" selected>Normal</option>
                            <option value="fast">Fast</option>
                        </select>
                    </div>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" id="submit-btn" class="btn btn-primary btn-lg rounded-pill position-relative overflow-hidden border-0 text-white fw-bold py-3 upload-submit-btn">
                        <span class="position-relative z-1 d-flex align-items-center justify-content-center" id="submit-text">
                            <span class="me-2 fs-5">Convert</span>
                            <i class="bi bi-arrow-right-circle"></i>
                        </span>
                        <div class="btn-glow position-absolute top-0 start-0 w-100 h-100"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('pdf_file');
    const fileNameDisplay = document.getElementById('file-name');
    const dropText = document.getElementById('drop-text');
    const uploadIcon = document.getElementById('upload-icon');
    const form = document.querySelector('form');
    const submitBtn = document.getElementById('submit-btn');
    const submitText = document.getElementById('submit-text');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, highlight, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, unhighlight, false);
    });

    function highlight(e) {
        dropZone.style.borderColor = 'var(--neon-cyan)';
        dropZone.style.background = 'linear-gradient(145deg, rgba(114, 220, 255, 0.05) 0%, rgba(15, 23, 42, 0.7) 100%)';
    }

    function unhighlight(e) {
        dropZone.style.borderColor = '';
        dropZone.style.background = '';
    }

    fileInput.addEventListener('change', function(e) {
        const file = this.files[0];
        if (file) {
            if (file.type !== 'application/pdf') {
                fileNameDisplay.textContent = 'Please select a valid PDF file.';
                fileNameDisplay.style.color = '#ff716c';
                this.value = ''; // clear
                return;
            }
            
            const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
            dropText.textContent = 'File Selected';
            fileNameDisplay.textContent = `${file.name} (${sizeMB} MB)`;
            fileNameDisplay.style.color = 'var(--text-secondary)';
            uploadIcon.style.color = 'var(--neon-cyan)';
            uploadIcon.style.filter = 'drop-shadow(0 0 8px var(--neon-cyan))';
        }
    });

    form.addEventListener('submit', function() {
        submitBtn.disabled = true;
        submitBtn.style.opacity = '0.8';
        submitText.innerHTML = `<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Processing...`;
    });
</script>

<style>
    .min-vh-100 {
        min-height: calc(100vh - 160px) !important;
    }

    .animated-bg-glow {
        background: radial-gradient(circle at center, rgba(0, 243, 255, 0.08) 0%, transparent 50%);
        animation: pulse-bg 8s ease-in-out infinite alternate;
    }

    @keyframes pulse-bg {
        0% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
        50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; background: radial-gradient(circle at center, rgba(188, 19, 254, 0.08) 0%, transparent 50%); }
        100% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.8; }
    }

    .hero-waveform {
        display: flex;
        align-items: center;
        gap: 4px;
        height: 30px;
    }

    .hero-bar {
        width: 4px;
        background-color: var(--neon-cyan);
        border-radius: 2px;
        box-shadow: 0 0 8px var(--neon-cyan);
        animation: hero-wave 1.2s ease-in-out infinite;
    }

    .hero-bar:nth-child(1) { height: 10px; animation-delay: 0s; }
    .hero-bar:nth-child(2) { height: 20px; animation-delay: 0.1s; background-color: var(--neon-purple); box-shadow: 0 0 8px var(--neon-purple); }
    .hero-bar:nth-child(3) { height: 30px; animation-delay: 0.2s; }
    .hero-bar:nth-child(4) { height: 15px; animation-delay: 0.3s; }

    @keyframes hero-wave {
        0%, 100% { transform: scaleY(1); opacity: 0.7; }
        50% { transform: scaleY(1.4); opacity: 1; filter: brightness(1.3); }
    }

    .upload-drop-zone {
        border: 2px dashed rgba(0, 243, 255, 0.4);
        background: linear-gradient(145deg, rgba(5, 8, 17, 0.8) 0%, rgba(15, 23, 42, 0.6) 100%);
        box-shadow: inset 0 0 30px rgba(0, 243, 255, 0.05);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .upload-drop-zone:hover {
        border-color: var(--neon-cyan) !important;
        background: linear-gradient(145deg, rgba(0, 243, 255, 0.05) 0%, rgba(15, 23, 42, 0.7) 100%) !important;
        box-shadow: 0 0 35px rgba(0, 243, 255, 0.15) inset, 0 0 20px rgba(0, 243, 255, 0.2) !important;
        transform: translateY(-2px);
    }

    .upload-field-label {
        letter-spacing: 0.05em;
        color: var(--neon-cyan) !important;
    }

    .upload-submit-btn {
        background: linear-gradient(135deg, var(--neon-blue) 0%, #1d4ed8 100%);
        box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .upload-submit-btn:hover {
        transform: scale(1.02) translateY(-3px);
        box-shadow: 0 10px 40px rgba(0, 243, 255, 0.7) !important;
    }

    .btn-glow {
        background: linear-gradient(135deg, var(--neon-purple) 0%, var(--neon-cyan) 100%);
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .upload-submit-btn:hover .btn-glow {
        opacity: 1 !important;
    }
</style>
{% endblock %}
