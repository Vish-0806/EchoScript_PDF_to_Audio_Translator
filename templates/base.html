<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts for consistent font styles -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>{% block title %}EchoScript{% endblock %}</title>
</head>
<body class="dark-theme">
    <!-- Navbar -->
    <nav class="navbar navbar-dark navbar-expand-lg border-bottom border-secondary border-opacity-10 py-3">
        <div class="container">
            <a class="navbar-brand text-white d-flex align-items-center" href="/">
                <i class="bi bi-soundwave me-2 fs-4" style="color: var(--neon-cyan); filter: drop-shadow(0 0 8px var(--neon-cyan));"></i>
                <span class="text-gradient">EchoScript</span>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-medium">
                    <li class="nav-item">
                        <a class="nav-link px-3 py-2 rounded-3 nav-hover transition-all" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 py-2 rounded-3 nav-hover transition-all" href="/#features">Features</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 py-2 rounded-3 nav-hover transition-all" href="{{ url_for('upload') }}">Upload</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 py-2 rounded-3 nav-hover transition-all" href="/#about">The EchoScript Vision</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 py-2 rounded-3 nav-hover transition-all" href="/#developer">Built By</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 py-2 rounded-3 nav-hover transition-all" href="{{ url_for('feedback') }}">Feedback</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="content-wrapper flex-grow-1">
        <div class="container main-container py-4">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <a href="{{ url_for('feedback') }}" class="floating-feedback-btn" aria-label="Open feedback section">
        <i class="bi bi-chat-dots-fill"></i>
        <span>Feedback</span>
    </a>

    <!-- Footer -->
    <footer class="py-3 mt-auto border-top border-secondary border-opacity-10">
        <div class="container text-center">
            <p class="mb-0 small developer-credit">
                Built by <a href="https://github.com/Vish-0806" target="_blank" rel="noopener noreferrer" class="text-decoration-none text-muted hover-glow">Vishal</a>
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
