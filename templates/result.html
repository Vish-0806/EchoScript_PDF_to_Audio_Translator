{% extends "base.html" %}

{% block title %}Extraction Result - EchoScript{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h2 class="mb-0">Extracted Text</h2>
                </div>
                <div class="card-body">
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <div class="border rounded p-3 bg-light h-100">
                                <div class="small text-muted">Total Pages</div>
                                <div class="h4 mb-0">{{ page_count }}</div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="border rounded p-3 bg-light h-100">
                                <div class="small text-muted">Total Words</div>
                                <div class="h4 mb-0">{{ word_count }}</div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="border rounded p-3 bg-light h-100">
                                <div class="small text-muted">Estimated Audio</div>
                                <div class="h4 mb-0">{{ estimated_minutes }} min</div>
                            </div>
                        </div>
                    </div>

                    <div class="w-100 mx-auto mb-4" style="max-width: 900px;">
                        <h5 class="mb-3 fw-semibold text-secondary">Document Preview</h5>
                        <div class="bg-white rounded-3 shadow-sm w-100" style="padding: 30px; max-height: 500px; overflow-y: auto;">
                            <div class="text-start" style="white-space: pre-wrap; word-break: break-word; line-height: 1.7; font-family: Georgia, 'Times New Roman', serif;">
                                {{- text | trim -}}
                            </div>
                        </div>
                    </div>

                    <form action="/convert" method="POST">
                        <input type="hidden" name="conversion_id" value="{{ conversion_id }}">
                        <div class="mb-3">
                            <label for="voice" class="form-label">Select Voice</label>
                            <select id="voice" name="voice" class="form-select">
                                <option value="en-US-AriaNeural">en-US-AriaNeural (Female)</option>
                                <option value="en-US-GuyNeural">en-US-GuyNeural (Male)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="speed" class="form-label">Playback Speed</label>
                            <select id="speed" name="speed" class="form-select">
                                <option value="slow">slow (0.8x)</option>
                                <option value="normal" selected>normal (1.0x)</option>
                                <option value="fast">fast (1.2x)</option>
                            </select>
                        </div>
                        <label for="languageSelect" class="form-label">Select Language</label>
                        <select id="languageSelect" name="language" class="form-select mb-3">
                            <option value="en" selected>en (English)</option>
                            <option value="hi">hi (Hindi)</option>
                            <option value="es">es (Spanish)</option>
                            <option value="kn">kn (Kannada)</option>
                        </select>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" name="translate" id="translateToggle" checked>
                            <label class="form-check-label" for="translateToggle">
                                Translate before audio
                            </label>
                        </div>
                        <div class="d-grid gap-2 d-md-block">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-mic-fill"></i> Generate Audio
                            </button>
                        </div>
                    </form>

                    <script>
                        const toggle = document.getElementById("translateToggle");
                        const dropdown = document.getElementById("languageSelect");

                        function updateState() {
                            dropdown.disabled = !toggle.checked;
                            dropdown.classList.toggle("bg-light", dropdown.disabled);
                            dropdown.classList.toggle("text-muted", dropdown.disabled);
                        }

                        toggle.addEventListener("change", updateState);
                        window.onload = updateState;
                    </script>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
