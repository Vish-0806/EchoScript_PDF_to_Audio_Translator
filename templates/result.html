{% extends "base.html" %}

{% block title %}Extraction Result - EchoScript{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h2 class="mb-0">Extracted Text</h2>
                </div>
                <div class="card-body">
                    <div class="border rounded p-3 mb-4" style="white-space: pre-wrap; background-color: #f8f9fa; max-height: 400px; overflow-y: auto;">
                        {{ text }}
                    </div>

                    <form action="/convert" method="POST">
                        <input type="hidden" name="conversion_id" value="{{ conversion_id }}">
                        <div class="d-grid gap-2 d-md-block">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-mic-fill"></i> Convert to Audio
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
