<!DOCTYPE html>
<html>
<head>
    <title>Extraction Result</title>
</head>
<body>
    <h1>Extracted Text</h1>

    <div style="white-space: pre-wrap; border: 1px solid #ccc; padding: 15px;">
        {{ text }}
    </div>

    <br>

    <form action="/convert" method="POST">
        <input type="hidden" name="conversion_id" value="{{ conversion_id }}">
        <button type="submit">Convert to Audio</button>
    </form>

</body>
</html>
