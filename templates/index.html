{% extends "base.html" %}

{% block title %}EchoScript – PDF to Audio Converter{% endblock %}

{% block content %}
<section class="landing-shell d-flex align-items-center justify-content-center py-4 py-md-5">
    <div class="w-100" style="max-width: 640px;">
        <div class="card upload-card border-0">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h1 class="upload-title fw-bold mb-2">EchoScript</h1>
                    <p class="upload-subtitle fs-5 mb-0">Convert PDFs into natural audio</p>
                </div>

                <form action="/upload" method="POST" enctype="multipart/form-data" class="mt-2">
                    <div class="mb-4">
                        <label for="pdf_file" class="form-label fw-semibold mb-2">Choose PDF</label>
                        <input
                            type="file"
                            class="form-control file-input"
                            id="pdf_file"
                            name="pdf_file"
                            accept=".pdf"
                            required
                        >
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg btn-upload">Upload & Convert</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
