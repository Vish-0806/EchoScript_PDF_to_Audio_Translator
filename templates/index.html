{% extends "base.html" %}

{% block title %}EchoScript – PDF to Audio Converter{% endblock %}

{% block content %}
<style>
    /* Override base.html styles for home page */
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
    }
    nav.navbar {
        background: rgba(0, 0, 0, 0.3) !important;
        backdrop-filter: blur(10px);
    }
    footer {
        background: rgba(0, 0, 0, 0.2) !important;
        color: white !important;
        border-top: 1px solid rgba(255, 255, 255, 0.2) !important;
    }
    footer .text-muted {
        color: rgba(255, 255, 255, 0.8) !important;
    }
    .content-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .main-card {
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        border: none;
        border-radius: 15px;
    }
    .card-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-radius: 15px 15px 0 0 !important;
        padding: 2rem;
    }
    .card-body {
        padding: 2.5rem;
    }
    .btn-upload {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        padding: 0.75rem 2rem;
        font-size: 1.1rem;
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-upload:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
</style>

<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8 col-sm-10">
        <div class="card main-card">
            <div class="card-header text-center">
                <h1 class="mb-2">EchoScript</h1>
                <h5 class="fw-light">PDF to Audio Converter</h5>
            </div>
            <div class="card-body">
                <p class="text-center text-muted mb-4">
                    Upload a PDF and convert it into natural speech audio.
                </p>
                
                <form action="/upload" method="POST" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label for="pdf_file" class="form-label fw-semibold">Select PDF File</label>
                        <input type="file" 
                               class="form-control form-control-lg" 
                               id="pdf_file"
                               name="pdf_file" 
                               accept=".pdf" 
                               required>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg btn-upload">
                            Convert to Audio
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
