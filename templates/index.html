<!DOCTYPE html>
<html>
<head>
    <title>EchoScript</title>
</head>
<body>
    <h1>Upload a PDF</h1>

    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="file" name="pdf_file" accept=".pdf" required>
        <button type="submit">Upload</button>
    </form>
</body>
</html>
