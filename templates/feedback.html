{% extends "base.html" %}

{% block title %}Feedback - EchoScript{% endblock %}

{% block content %}

<div class="feedback-bg" aria-hidden="true">
    <div class="feedback-bg-particles"></div>
</div>

<section style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 60px 20px; position: relative; overflow: hidden;">

  <div class="feedback-container glass-card" style="max-width: 600px; width: 100%; padding: 40px; border-radius: 1.25rem;">

    <div class="text-center mb-4">
        <h1 class="text-gradient display-6 fw-bold mb-2">💬 Share Feedback</h1>
        <p class="text-secondary mb-0">Help us shape the future of EchoScript</p>
    </div>

    {% if error_message %}
    <div class="alert alert-danger" role="alert">
      {{ error_message }}
    </div>
    {% endif %}

    <form method="POST" action="/feedback">

      <div class="mb-4">
        <input type="text" name="name" placeholder="Your Name" required
          class="form-control p-3">
      </div>

      <div class="mb-4">
        <input type="email" name="email" placeholder="Your Email" required
          class="form-control p-3">
      </div>

      <div class="mb-4">
        <textarea name="message" placeholder="Your Feedback" required rows="4"
          class="form-control p-3"></textarea>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-3 fs-5 rounded-pill mt-2">
        Submit Feedback
      </button>

    </form>

  </div>

</section>

{% endblock %}
