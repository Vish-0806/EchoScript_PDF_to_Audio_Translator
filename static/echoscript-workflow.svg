<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1600" viewBox="0 0 900 1600" role="img" aria-labelledby="title desc">
  <title id="title">EchoScript workflow diagram</title>
  <desc id="desc">Vertical pipeline showing Upload PDF, Extract Text, Chunk Processing, Translate Optional, Generate Audio, Merge Audio Chunks, and Download Play.</desc>
  <defs>
    <style>
      .bg { fill: #000000; }
      .box { fill: #262626; stroke: #d9d9d9; stroke-width: 4; rx: 6; }
      .label { fill: #d0d0d0; font-family: Arial, Helvetica, sans-serif; font-size: 54px; font-weight: 400; text-anchor: middle; dominant-baseline: middle; }
      .line { stroke: #d9d9d9; stroke-width: 4; fill: none; }
      .arrow { fill: #d9d9d9; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <path class="arrow" d="M 0 0 L 12 6 L 0 12 z" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="900" height="1600" />

  <rect class="box" x="170" y="50" width="560" height="130" />
  <text class="label" x="450" y="115">Upload PDF</text>

  <line class="line" x1="450" y1="180" x2="450" y2="310" marker-end="url(#arrowhead)" />

  <rect class="box" x="170" y="330" width="560" height="130" />
  <text class="label" x="450" y="395">Extract Text</text>

  <line class="line" x1="450" y1="460" x2="450" y2="590" marker-end="url(#arrowhead)" />

  <rect class="box" x="115" y="610" width="670" height="130" />
  <text class="label" x="450" y="675">Chunk Processing</text>

  <line class="line" x1="450" y1="740" x2="450" y2="870" marker-end="url(#arrowhead)" />

  <rect class="box" x="40" y="890" width="820" height="130" />
  <text class="label" x="450" y="955">Translate (Optional)</text>

  <line class="line" x1="450" y1="1020" x2="450" y2="1150" marker-end="url(#arrowhead)" />

  <rect class="box" x="130" y="1170" width="640" height="130" />
  <text class="label" x="450" y="1235">Generate Audio</text>

  <line class="line" x1="450" y1="1300" x2="450" y2="1430" marker-end="url(#arrowhead)" />

  <rect class="box" x="25" y="1450" width="850" height="130" />
  <text class="label" x="450" y="1515">Download / Play</text>
</svg>